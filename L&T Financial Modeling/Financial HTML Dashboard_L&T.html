function parseNum(v){ if(v===null||v===undefined||v==='') return 0; if(typeof v==='number') return v; let s=String(v).replace(/[$,% ,]/g,''); let n=Number(s); return isNaN(n)?0:n; }
function parsePct(v){ if(v===null||v===undefined||v==='') return 0; if(typeof v==='number') return v>1?v/100:v; let s=String(v).trim(); let n=parseFloat(s.replace('%','')); return isNaN(n)?0:(s.includes('%')?n/100:n); }
function normRows(csv){ return Papa.parse(csv,{header:true,dynamicTyping:false,skipEmptyLines:true}).data.map(r=>{ const o={}; Object.keys(r).forEach(k=>{ if(k && !k.startsWith('Unnamed')) o[k.trim()]=r[k]; }); return o; }).filter(r=>Object.values(r).some(v=>v!==''&&v!==null&&v!==undefined)); }
function loadEmbedded(){ raw={...EMBEDDED_CSVS}; initialize(); }
function validate(){ const missing=REQUIRED.filter(f=>!raw[f]); if(missing.length) throw new Error('Missing required files: '+missing.join(', ')); }
function initialize(){ try{ validate(); data.pnl=normRows(raw['PnL.csv']).map(r=>({'Fiscal Year':parseNum(r['Fiscal Year']),Category:r.Category,Revenue:parseNum(r.Revenue),EBITDA:parseNum(r.EBITDA),'Net Profit':parseNum(r['Net Profit']),'EBITDA %':parsePct(r['EBITDA %']),'Net Profit %':parsePct(r['Net Profit %'])})); data.ebitda=normRows(raw['EBITDA.csv']).map(r=>({'Fiscal Year':parseNum(r['Fiscal Year']),Step:r.Step,Value:parseNum(r.Value)})); data.cash=normRows(raw['Cash Flow.csv']).map(r=>({'Fiscal Year':parseNum(r['Fiscal Year']),Step:r.Step,Value:parseNum(r.Value)})); data.bs=normRows(raw['Balance Sheet.csv']).map(r=>({'Fiscal Year':parseNum(r['Fiscal Year']),Category:r.Category,'Total Current Assets':parseNum(r['Total Current Assets'] ?? r['Total Curret Assets']),'Total Non-Current Assets':parseNum(r['Total Non-Current Assets']),'Total Current Liabilities':parseNum(r['Total Current Liabilities']),'Total Non-Current Liabilities':parseNum(r['Total Non-Current Liabilities']),'Total Shareholders Funds':parseNum(r['Total Shareholders Funds'])})); data.wc=normRows(raw['Working Capital.csv']).map(r=>({'Fiscal Year':parseNum(r['Fiscal Year']),Category:r.Category,'Total Current Assets':parseNum(r['Total Current Assets']),'Total Current Liabilities':parseNum(r['Total Current Liabilities']),'Working Capital':parseNum(r['Working Capital']),DSO:parseNum(r.DSO),DIO:parseNum(r.DIO),DPO:parseNum(r.DPO)})); data.dcf=normRows(raw['DCF.csv']).map(r=>({Scenario:r.Scenario,'Enterprise Value':parseNum(r['Enterprise Value']),'Equity Value':parseNum(r['Equity Value']),'CFs in Forecast Period':parsePct(r['CFs in Forecast Period'] ?? r['CFs in Forecast period']),'Continuing Value':parsePct(r['Continuing Value'])})).filter(r=>r.Scenario); setupFilters(); renderAll(); }catch(e){ showError(e.message); }}
function showError(msg){ const el=document.getElementById('error'); el.textContent=msg; el.style.display='block'; }
function unique(a){return [...new Set(a.filter(x=>x!==undefined&&x!==null&&x!==''))];}
function setupFilters(){ const years=unique([...data.pnl,...data.bs,...data.wc].map(r=>r['Fiscal Year'])).sort((a,b)=>a-b); filters.yearFrom=Math.min(...years); filters.yearTo=Math.max(...years); document.getElementById('yearFrom').value=filters.yearFrom; document.getElementById('yearTo').value=filters.yearTo; fillMulti('category', unique([...data.pnl,...data.bs,...data.wc].map(r=>r.Category))); fillMulti('scenario', unique(data.dcf.map(r=>r.Scenario))); document.querySelectorAll('#yearFrom,#yearTo,#category,#scenario,#metric').forEach(el=>el.onchange=readFilters); }
function fillMulti(id, vals){ const el=document.getElementById(id); el.innerHTML=vals.map(v=>`<option selected value="${v}">${v}</option>`).join(''); }
function selected(id){ return [...document.getElementById(id).selectedOptions].map(o=>o.value); }
function readFilters(){ filters.yearFrom=parseNum(document.getElementById('yearFrom').value); filters.yearTo=parseNum(document.getElementById('yearTo').value); filters.categories=selected('category'); filters.scenarios=selected('scenario'); filters.metric=document.getElementById('metric').value; renderAll(); }
function resetFilters(){ [...document.querySelectorAll('select[multiple] option')].forEach(o=>o.selected=true); setupFilters(); renderAll(); }
function inYear(r){return r['Fiscal Year']>=filters.yearFrom && r['Fiscal Year']<=filters.yearTo;}
function inCat(r){return !r.Category || filters.categories.includes(r.Category);}
function filtered(){ return {pnl:data.pnl.filter(r=>inYear(r)&&inCat(r)), ebitda:data.ebitda.filter(inYear), cash:data.cash.filter(inYear), bs:data.bs.filter(r=>inYear(r)&&inCat(r)), wc:data.wc.filter(r=>inYear(r)&&inCat(r)), dcf:data.dcf.filter(r=>filters.scenarios.includes(r.Scenario))}; }
function latest(rows, field){ if(!rows.length) return 0; return [...rows].sort((a,b)=>b['Fiscal Year']-a['Fiscal Year'])[0][field]||0; }
function total(rows, field){ return rows.reduce((s,r)=>s+(r[field]||0),0); }
function renderAll(){ const f=filtered(); renderSummary(f); renderKPIs(f); renderCharts(f); renderTables(f); }
function renderSummary(f){ document.getElementById('summaryBar').innerHTML = `<span class="pill">Selected Years: ${filters.yearFrom}–${filters.yearTo}</span> <span class="pill">Actuals: ${f.pnl.filter(r=>r.Category==='Actuals').length}</span> <span class="pill">Forecasts: ${f.pnl.filter(r=>r.Category==='Forecasts').length}</span> <span class="pill">Total Revenue: ${moneyFmt.format(total(f.pnl,'Revenue'))}</span> <span class="pill">Total EBITDA: ${moneyFmt.format(total(f.pnl,'EBITDA'))}</span> <span class="pill">Enterprise Value: ${moneyFmt.format(total(f.dcf,'Enterprise Value'))}</span>`; }
function renderKPIs(f){ const latestP = [...f.pnl].sort((a,b)=>b['Fiscal Year']-a['Fiscal Year'])[0]||{}; const latestW = [...f.wc].sort((a,b)=>b['Fiscal Year']-a['Fiscal Year'])[0]||{}; const firstD = f.dcf[0]||{}; const k=[['Latest Revenue',moneyFmt.format(latestP.Revenue||0)],['Latest EBITDA',moneyFmt.format(latestP.EBITDA||0)],['Latest Net Profit',moneyFmt.format(latestP['Net Profit']||0)],['EBITDA Margin %',pctFmt.format(latestP['EBITDA %']||0)],['Net Profit Margin %',pctFmt.format(latestP['Net Profit %']||0)],['Working Capital',moneyFmt.format(latestW['Working Capital']||0)],['Enterprise Value',moneyFmt.format(firstD['Enterprise Value']||0)],['Equity Value',moneyFmt.format(firstD['Equity Value']||0)]]; document.getElementById('kpis').innerHTML=k.map(x=>`<div class="kpi"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join(''); }
function chartCard(id,title){return `<div class="chart-card"><h3>${title}</h3><div class="chart-wrap"><canvas id="${id}"></canvas></div></div>`}
function renderCharts(f){ const holder=document.getElementById('charts'); if(!holder.dataset.ready){ holder.innerHTML = chartCard('rev','Revenue Trend')+chartCard('profit','EBITDA vs Net Profit')+chartCard('margin','Margin Analysis')+chartCard('cash','Cash Flow Waterfall')+chartCard('wcTrend','Working Capital Trend')+chartCard('drivers','Working Capital Drivers')+chartCard('bs','Balance Sheet Composition')+chartCard('sf','Shareholders Funds Growth')+chartCard('ebBridge','EBITDA Bridge')+chartCard('ev','DCF Valuation Comparison')+chartCard('eq','Equity Value by Scenario')+chartCard('dcfComp','DCF Value Composition'); holder.dataset.ready='1'; }
 Object.values(charts).forEach(c=>c.destroy()); charts={};
 const years=unique(f.pnl.map(r=>r['Fiscal Year'])).sort((a,b)=>a-b); const catPointStyle=r=>r.Category==='Actuals'?'circle':'triangle';
 charts.rev=line('rev', years, [{label:'Actuals Revenue',data:years.map(y=>{let r=f.pnl.find(x=>x['Fiscal Year']==y&&x.Category==='Actuals');return r?r.Revenue:null}), tension:.35},{label:'Forecasts Revenue',data:years.map(y=>{let r=f.pnl.find(x=>x['Fiscal Year']==y&&x.Category==='Forecasts');return r?r.Revenue:null}), tension:.35,borderDash:[6,5]}], 'currency', clickYear);
 charts.profit=line('profit', years, [{label:'EBITDA',data:years.map(y=>sumBy(f.pnl,'Fiscal Year',y,'EBITDA'))},{label:'Net Profit',data:years.map(y=>sumBy(f.pnl,'Fiscal Year',y,'Net Profit'))}], 'currency', clickYear);
 charts.margin=line('margin', years, [{label:'EBITDA %',data:years.map(y=>avgBy(f.pnl,'Fiscal Year',y,'EBITDA %'))},{label:'Net Profit %',data:years.map(y=>avgBy(f.pnl,'Fiscal Year',y,'Net Profit %'))}], 'percent', clickYear);
 const cashYears=unique(f.cash.map(r=>r['Fiscal Year'])).sort((a,b)=>a-b); const cashSteps=['Operating CF','Investing CF','Financing CF']; const cashSeries=cashSteps.map(s=>({label:s,data:cashYears.map(y=>sumWhere(f.cash,y,s))})); cashSeries.push({label:'Net Cash Flow',data:cashYears.map(y=>cashSteps.reduce((t,s)=>t+sumWhere(f.cash,y,s),0))}); charts.cash=bar('cash', cashYears, cashSeries, 'currency', clickYear);
 const wcYears=unique(f.wc.map(r=>r['Fiscal Year'])).sort((a,b)=>a-b); charts.wcTrend=line('wcTrend', wcYears, [{label:'Working Capital',data:wcYears.map(y=>sumBy(f.wc,'Fiscal Year',y,'Working Capital'))}], 'currency', clickYear);
 charts.drivers=line('drivers', wcYears, ['DSO','DIO','DPO'].map(s=>({label:s,data:wcYears.map(y=>avgBy(f.wc,'Fiscal Year',y,s))})), 'number', clickYear);
 const bsYears=unique(f.bs.map(r=>r['Fiscal Year'])).sort((a,b)=>a-b); charts.bs=bar('bs', bsYears, ['Total Current Assets','Total Non-Current Assets','Total Current Liabilities','Total Non-Current Liabilities'].map(s=>({label:s,data:bsYears.map(y=>sumBy(f.bs,'Fiscal Year',y,s))})), 'currency', clickYear, true);
 charts.sf=line('sf', bsYears, [{label:'Shareholders Funds',data:bsYears.map(y=>sumBy(f.bs,'Fiscal Year',y,'Total Shareholders Funds'))}], 'currency', clickYear);
 const ebSteps=['Total Revenue','COGS','Opex']; const ebValues=ebSteps.map(s=>total(f.ebitda.filter(r=>r.Step===s),'Value')); const ebLabels=[...ebSteps,'EBITDA']; const ebData=[...ebValues,ebValues.reduce((a,b)=>a+b,0)]; charts.ebBridge=bar('ebBridge', ebLabels, [{label:'Bridge value',data:ebData}], 'currency', null);
 const sc=f.dcf.map(r=>r.Scenario); charts.ev=bar('ev', sc, [{label:'Enterprise Value',data:f.dcf.map(r=>r['Enterprise Value'])}], 'currency', clickScenario);
 charts.eq=bar('eq', sc, [{label:'Equity Value',data:f.dcf.map(r=>r['Equity Value'])}], 'currency', clickScenario);
 const d=f.dcf[0]||{}; charts.dcfComp=new Chart(document.getElementById('dcfComp'),{type:'doughnut',data:{labels:['CFs in Forecast Period','Continuing Value'],datasets:[{data:[d['CFs in Forecast Period']||0,d['Continuing Value']||0]}]},options:baseOpts('percent')}); }
function sumBy(rows,key,val,field){return rows.filter(r=>r[key]==val).reduce((s,r)=>s+(r[field]||0),0)} function avgBy(rows,key,val,field){let a=rows.filter(r=>r[key]==val);return a.length?a.reduce((s,r)=>s+(r[field]||0),0)/a.length:0} function sumWhere(rows,y,step){return rows.filter(r=>r['Fiscal Year']==y&&r.Step===step).reduce((s,r)=>s+r.Value,0)}
function baseOpts(format, click, stacked=false){return {responsive:true,maintainAspectRatio:false,animation:{duration:450},plugins:{legend:{labels:{color:'#dbe7ff'}},tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset?.label||ctx.label}: ${fmt(ctx.parsed.y ?? ctx.parsed,format)}`}}},scales:{x:{ticks:{color:'#aebce0'},grid:{color:'rgba(255,255,255,.06)'},stacked},y:{ticks:{color:'#aebce0',callback:v=>fmt(v,format)},grid:{color:'rgba(255,255,255,.08)'},stacked}},onClick:click};}
function fmt(v,type){return type==='currency'?moneyFmt.format(v):type==='percent'?pctFmt.format(v):numFmt.format(v)}
function line(id, labels, datasets, format, click){ return new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:datasets.map(d=>({...d,spanGaps:true,pointRadius:4,borderWidth:2}))},options:baseOpts(format,click)}); }
function bar(id, labels, datasets, format, click, stacked=false){ return new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets},options:baseOpts(format,click,stacked)}); }
function clickYear(evt, elements, chart){ if(!elements.length) return; const year=Number(chart.data.labels[elements[0].index]); document.getElementById('yearFrom').value=year; document.getElementById('yearTo').value=year; readFilters(); }
function clickScenario(evt, elements, chart){ if(!elements.length) return; const s=chart.data.labels[elements[0].index]; [...document.getElementById('scenario').options].forEach(o=>o.selected=o.value===s); readFilters(); }
function renderTables(f){ const rows={pnl:f.pnl.map(r=>({'Fiscal Year':r['Fiscal Year'],Revenue:r.Revenue,EBITDA:r.EBITDA,'Net Profit':r['Net Profit'],'EBITDA %':r['EBITDA %'],'Net Profit %':r['Net Profit %']})), bs:f.bs.map(r=>({'Fiscal Year':r['Fiscal Year'],Assets:r['Total Current Assets']+r['Total Non-Current Assets'],Liabilities:r['Total Current Liabilities']+r['Total Non-Current Liabilities'],'Shareholders Funds':r['Total Shareholders Funds']})), wc:f.wc.map(r=>({'Fiscal Year':r['Fiscal Year'],'Working Capital':r['Working Capital'],DSO:r.DSO,DIO:r.DIO,DPO:r.DPO})), dcf:f.dcf.map(r=>({Scenario:r.Scenario,'Enterprise Value':r['Enterprise Value'],'Equity Value':r['Equity Value']}))}; const names={pnl:'P&L Table',bs:'Balance Sheet Table',wc:'Working Capital Table',dcf:'DCF Scenarios Table'}; const holder=document.getElementById('tables'); if(!holder.dataset.ready){ holder.innerHTML=Object.keys(rows).map(k=>`<div class="table-card"><div class="table-top"><h3>${names[k]}</h3><div><input id="search_${k}" placeholder="Search table..."><button class="btn" onclick="exportTable('${k}')">Export CSV</button></div></div><div style="overflow:auto"><table id="table_${k}"></table></div><div class="pager" id="pager_${k}"></div></div>`).join(''); holder.dataset.ready='1'; Object.keys(rows).forEach(k=>{tableState[k]={page:1,sort:null,dir:1,rows:[]}; document.getElementById('search_'+k).oninput=()=>{tableState[k].page=1; drawTable(k);};}); } Object.keys(rows).forEach(k=>{tableState[k].rows=rows[k]; drawTable(k);}); }
function drawTable(k){ const st=tableState[k], q=(document.getElementById('search_'+k).value||'').toLowerCase(); let rows=st.rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q)); if(st.sort) rows.sort((a,b)=>(a[st.sort]>b[st.sort]?1:-1)*st.dir); const cols=Object.keys(rows[0]||{}); const start=(st.page-1)*25, pageRows=rows.slice(start,start+25); document.getElementById('table_'+k).innerHTML='<thead><tr>'+cols.map(c=>`<th onclick="sortTable('${k}','${c}')">${c}</th>`).join('')+'</tr></thead><tbody>'+pageRows.map(r=>'<tr>'+cols.map(c=>`<td>${cellFmt(c,r[c])}</td>`).join('')+'</tr>').join('')+'</tbody>'; const pages=Math.max(1,Math.ceil(rows.length/25)); st.page=Math.min(st.page,pages); document.getElementById('pager_'+k).innerHTML=`<button onclick="pageTable('${k}',-1)">Prev</button> Page ${st.page} of ${pages} | ${rows.length} rows <button onclick="pageTable('${k}',1)">Next</button>`; }
function cellFmt(c,v){ if(String(c).includes('%')) return pctFmt.format(v); if(['Revenue','EBITDA','Net Profit','Assets','Liabilities','Shareholders Funds','Working Capital','Enterprise Value','Equity Value'].includes(c)) return moneyFmt.format(v); return v; }
function sortTable(k,c){ const st=tableState[k]; st.dir=st.sort===c?-st.dir:1; st.sort=c; drawTable(k); } function pageTable(k,d){ const st=tableState[k]; st.page=Math.max(1,st.page+d); drawTable(k); }
function exportTable(k){ const rows=tableState[k].rows; if(!rows.length) return; const cols=Object.keys(rows[0]); const csv=[cols.join(','),...rows.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))].join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=k+'_filtered.csv'; a.click(); }
function exportDashboardPNG(){ html2canvas(document.getElementById('dashboardRoot'),{backgroundColor:'#0b1020',scale:2}).then(canvas=>{const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download='financial_dashboard.png'; a.click();}); }
loadEmbedded();
</script>
</body></html>
